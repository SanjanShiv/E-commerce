# Server Port
server.port=8080

# Profile inclusion (for local development secrets)
spring.profiles.include=secrets

# Database Configuration (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/ecommerce?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:password_here}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration (Custom Property)
app.jwt.secret=${JWT_SECRET:your_base64_secret_key_here}
app.jwt.expiration-ms=86400000

# OAuth2 SSO Configuration (Placeholders)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:your_client_id_here}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:your_client_secret_here}
spring.security.oauth2.client.registration.google.scope=profile,email
